name: Update Checker

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Discover all package manifests ───────────────────────────────────────────
  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: List package manifests
        id: list
        run: |
          packages=$(
            find src/ -maxdepth 2 \( -name '*.yml' -o -name '*.yaml' \) \
              | while IFS= read -r f; do
                  stem=$(basename "${f%.*}")
                  dir=$(basename "$(dirname "$f")")
                  [[ "$stem" == "$dir" ]] && echo "$f"
                done \
              | sort -u \
              | jq -R . | jq -sc .
          )
          echo "packages=${packages}" >> "$GITHUB_OUTPUT"

  # ── Check each package for outdated or broken sources ────────────────────────
  check:
    name: Check ${{ matrix.package }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check and update ${{ matrix.package }}
        uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        env:
          GIT_AUTHOR_NAME: Flatpak External Data Checker
          GIT_COMMITTER_NAME: Flatpak External Data Checker
          # Sets commit author to github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --update --never-fork ${{ matrix.package }}
