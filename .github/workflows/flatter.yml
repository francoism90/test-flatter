name: Flatter

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  flatter:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:25.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate a CNAME file in current directory
      - name: Generate CNAME
        run: |
          echo "flatter.francoism90.ca" > CNAME

      - name: Setup GPG
        # Skip GPG signing for pull requests
        if: ${{ github.triggering_actor == github.repository_owner }}
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Install SDK Extensions
        run: |
          flatpak install --noninteractive flathub org.freedesktop.Sdk.Extension.golang//25.08

      - name: Build
        uses: andyholmes/flatter@main
        with:
          files: |
            build-aux/org.freedesktop.Sdk.Extension.podman/org.freedesktop.Sdk.Extension.podman.yml
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-pages-artifact: true
          upload-pages-includes: |
            CNAME
            default.css
            index.html

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: flatter
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
