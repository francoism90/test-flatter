name: Flatter (signed)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/flatter.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild nightly to catch upstream changes
    - cron: "0 2 * * *"

jobs:
  build:
    name: Build Flatpak Packages
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:25.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GPG
        # Skip GPG signing for pull requests (requires secrets from repo owner)
        if: ${{ github.triggering_actor == github.repository_owner && github.event_name != 'pull_request' }}
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Install SDK Extensions
        run: |
          # Install any required SDK extensions here
          flatpak install --noninteractive flathub org.freedesktop.Sdk.Extension.golang//25.08

      - name: Build Packages
        uses: andyholmes/flatter@main
        with:
          # A list of package manifests to build
          files: |
            src/org.freedesktop.Sdk.Extension.podman/org.freedesktop.Sdk.Extension.podman.yml
            src/io.github.francoism90.HelloFlatpak/io.github.francoism90.HelloFlatpak.yml
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-pages-artifact: true
          upload-pages-includes: |
            CNAME
            index.html
            README.md

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
